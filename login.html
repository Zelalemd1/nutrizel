<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Nutrizel</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />
</head>
<body>
<div id="notification-container"></div>
<div id="loading-overlay" class="hidden"><div class="spinner"></div></div>

<div class="auth-page">
  <div class="auth-card animate-fade-up">
    <div class="auth-logo">
      <div class="logo-icon">🌿</div>
      <h1>Nutrizel</h1>
      <p>Health &amp; Nutrition Center</p>
    </div>

    <h2 style="font-size:1.3rem;font-weight:700;margin-bottom:1.5rem;text-align:center;" data-i18n="login_title">Login to Your Account</h2>

    <div class="form-group">
      <label data-i18n="login_email">Email Address</label>
      <input type="email" id="login-email" data-i18n="login_email" placeholder="Email Address" autocomplete="email" />
    </div>
    <div class="form-group">
      <label data-i18n="login_password">Password</label>
      <input type="password" id="login-password" data-i18n="login_password" placeholder="Password" autocomplete="current-password" />
    </div>

    <div id="login-error" class="form-error" aria-live="polite"></div>

    <button class="btn btn-primary btn-block mt-2" onclick="doLogin()" data-i18n="login_btn">Login</button>

    <div class="auth-divider">or</div>

    <button class="btn-google" onclick="googleSignIn()">
      <svg width="18" height="18" viewBox="0 0 48 48" style="flex-shrink:0"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Continue with Google
    </button>

    <!-- Demo credentials hint -->
    <div style="background:var(--primary-light);border-radius:var(--radius-sm);padding:0.8rem 1rem;font-size:0.82rem;color:var(--text-light);margin-bottom:1rem;">
      <strong style="color:var(--primary);">Demo Credentials:</strong><br/>
      Admin: admin@nutrizel.et / Admin@1234<br/>
      Register a new client account to test client features.
    </div>

    <div class="auth-footer">
      <span data-i18n="login_no_account">Don't have an account?</span>
      <a href="register.html" style="color:var(--primary);font-weight:700;margin-left:0.3rem;" data-i18n="nav_register">Register</a>
    </div>

    <div style="text-align:center;margin-top:1rem;">
      <a href="index.html" style="font-size:0.85rem;color:var(--text-light);">← Back to Home</a>
    </div>

    <div style="display:flex;align-items:center;justify-content:center;gap:1rem;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);">
      <div class="dark-toggle-wrap">
        <span>🌙</span>
        <label class="toggle-switch">
          <input type="checkbox" id="dark-toggle" />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <select id="lang-selector" class="lang-select">
        <option value="en">EN</option>
        <option value="am">አማ</option>
        <option value="or">OR</option>
        <option value="ti">ትግ</option>
      </select>
    </div>
  </div>
</div>

<script src="js/lang.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
  // ⚠️ Replace with your actual Google OAuth Client ID
  const GOOGLE_CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com";

  document.addEventListener("DOMContentLoaded", () => {
    const session = Auth.getSession();
    if (session) {
      window.location.href = session.role === "admin" ? "admin.html" : "dashboard.html";
    }
  });

  function doLogin() {
    const email = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;
    const errEl = document.getElementById("login-error");
    errEl.textContent = "";
    if (!email || !password) { errEl.textContent = "Please enter email and password."; return; }
    showLoading();
    setTimeout(() => {
      hideLoading();
      const result = Auth.login(email, password);
      if (!result.success) { errEl.textContent = result.message; return; }
      showNotification("Welcome back, " + result.session.name + "!", "success");
      setTimeout(() => {
        window.location.href = result.session.role === "admin" ? "admin.html" : "dashboard.html";
      }, 800);
    }, 700);
  }

  function googleSignIn() {
    if (GOOGLE_CLIENT_ID === "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com") {
      showNotification("Google Sign-In: replace GOOGLE_CLIENT_ID in login.html & register.html with your real Client ID.", "error");
      return;
    }
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: handleGoogleCredential
    });
    google.accounts.id.prompt();
  }

  function handleGoogleCredential(response) {
    // Decode JWT payload (no verification needed client-side — just reading claims)
    const payload = JSON.parse(atob(response.credential.split(".")[1]));
    const { name, email, picture, sub } = payload;
    // Auto-register if not exists, then login
    const result = Auth.loginOrRegisterGoogle({ name, email, googleId: sub });
    showNotification("Welcome, " + name + "!", "success");
    setTimeout(() => {
      window.location.href = result.role === "admin" ? "admin.html" : "dashboard.html";
    }, 800);
  }

  document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
</script>
</body>
</html>
